<div class="macro-container">
  <div class="macro-header">
    <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4">
      <h2>Roadmap Stratégique</h2>
      <button class="add-project-btn self-start" (click)="openCreatePage()">+ Nouveau Projet</button>
    </div>
  </div>

  <div class="project-list-area">
    <div *ngIf="projects.length === 0" class="empty-state">
      Aucun projet pour le moment.
    </div>
    
    <div class="project-card" *ngFor="let project of projects" (click)="openEditPage(project)">
      <div class="project-card-header">
        <h3 class="project-title">{{ project.name }}</h3>
        <span class="project-status" [style.color]="project.color_hex">{{ project.status }}</span>
      </div>
      <div class="project-card-dates">
        <span>{{ project.start | date:'dd/MM/yyyy' }}</span>
        <span> - </span>
        <span>{{ project.end | date:'dd/MM/yyyy' }}</span>
      </div>
    </div>
  </div>
</div>
