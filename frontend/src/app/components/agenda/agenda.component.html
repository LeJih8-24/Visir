<div class="agenda-scroll-container">
  
  <full-calendar 
    [options]="calendarOptions" 
    style="display: block; height: 100%; width: 100%;">
  </full-calendar>

</div>

<div class="ios-modal-backdrop" *ngIf="isModalOpen" (click)="closeModal()">
  <div class="ios-modal-card" (click)="$event.stopPropagation()">
    
    <div class="ios-modal-header">
      <button class="cancel-btn" (click)="closeModal()">Annuler</button>
      <h3>Nouvel événement</h3>
      <button class="add-btn" [disabled]="!newEventTitle" (click)="saveEvent()">Ajouter</button>
    </div>

    <div class="ios-modal-body">
      <input 
        type="text" 
        placeholder="Titre de l'événement" 
        [(ngModel)]="newEventTitle"
        class="ios-input"
        autofocus
      >
      <div class="date-preview" *ngIf="newEventStart">
        Du {{ newEventStart | date:'dd/MM/yy HH:mm' }} 
        au {{ newEventEnd | date:'dd/MM/yy HH:mm' }}
      </div>
    </div>

  </div>
</div>
