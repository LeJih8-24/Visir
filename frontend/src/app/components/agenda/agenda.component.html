<div class="relative h-full w-full bg-slate-900 text-slate-200 p-2 custom-calendar">
  
  <full-calendar [options]="calendarOptions" class="h-full"></full-calendar>

  <div *ngIf="isModalOpen" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm rounded-xl">
    <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-2xl w-80">
      
      <h3 class="text-lg font-bold text-teal-400 mb-4 tracking-wider uppercase text-sm">
        Nouvel Événement
      </h3>
      
      <p class="text-xs text-slate-400 mb-4">Date : {{ selectedDate }}</p>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-300 mb-1">Titre</label>
          <input 
            type="text" 
            [(ngModel)]="newEventTitle" 
            placeholder="Ex: Réunion projet..."
            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500"
          >
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-300 mb-1">Heure de début</label>
          <input 
            type="time" 
            [(ngModel)]="newEventTime" 
            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500"
          >
        </div>
      </div>

      <div class="flex justify-end gap-3 mt-6">
        <button 
          (click)="closeModal()" 
          class="px-4 py-2 text-sm font-semibold text-slate-400 hover:text-slate-200 transition-colors">
          Annuler
        </button>
        <button 
          (click)="saveEvent()"
          [disabled]="!newEventTitle.trim()"
          class="px-4 py-2 text-sm font-semibold bg-teal-600 hover:bg-teal-500 text-white rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-lg shadow-teal-900/50">
          Enregistrer
        </button>
      </div>

    </div>
  </div>

  <div *ngIf="isDetailsModalOpen && selectedEventDetails" class="absolute inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm rounded-xl">
    <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-2xl w-96 relative">
      
      <button (click)="closeDetailsModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
      </button>

      <div class="flex items-center gap-3 mb-4">
        <div class="h-3 w-3 rounded-full bg-teal-500 shadow-[0_0_8px_rgba(20,184,166,0.8)]"></div>
        <h3 class="text-xl font-bold text-slate-100">{{ selectedEventDetails.title }}</h3>
      </div>

      <div class="space-y-3 bg-slate-900/50 p-4 rounded-xl border border-slate-700/50">
        <div>
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Début</p>
          <p class="text-sm text-slate-200 capitalize">{{ selectedEventDetails.startFormatted }}</p>
        </div>
        
        <div *ngIf="selectedEventDetails.endFormatted !== 'Non spécifié'">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Fin</p>
          <p class="text-sm text-slate-200 capitalize">{{ selectedEventDetails.endFormatted }}</p>
        </div>
      </div>

      <div class="flex justify-between mt-6">
        <button 
          (click)="deleteSelectedEvent()" 
          class="px-4 py-2 text-sm font-semibold text-rose-400 hover:text-white hover:bg-rose-500/20 rounded-lg transition-colors border border-transparent hover:border-rose-500/50">
          Supprimer
        </button>
        <button 
          (click)="closeDetailsModal()"
          class="px-5 py-2 text-sm font-semibold bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-colors shadow-lg">
          Fermer
        </button>
      </div>

    </div>
  </div>

</div>
